reid_dim: 2048
latent_dim: 512
history_len: 5

projection:
  hidden_dim: 1024

predictor:
  num_diffusion_steps: 1
  time_dim: 64
  denoiser_hidden_dim: 1024

update_block:
  hidden_dim: 1024
  use_gru_cell_for_identity: true

training:
  batch_size: 32
  stage1_epochs: 30
  stage2_epochs: 20
  lr_stage1: 0.0001
  lr_stage2: 0.0001
  weight_decay: 0.0001
  stage1_mu_weight: 0.5
  stage1_diff_weight: 0.2
  stage1_metric_weight: 0.5
  stage1_improve_weight: 2.0
  stage1_improve_margin: 0.0
  stage1_margin: 0.2
  stage1_projection_warmup_epochs: 5
  stage1_supcon_weight: 1.0
  stage1_distill_weight: 1.0
  stage1_supcon_temperature: 0.1
  freeze_projection_after_warmup: true

obs_synthesis:
  clean_prob: 0.5
  dirty_lambda_min: 0.3
  dirty_lambda_max: 0.8

tracker:
  app_alpha: 0.5
  lost_decay: 0.8
  max_strong_app_lost_age: 5

num_workers: 0
val_fraction: 0.1
split_mode: sequence
val_sequences:
  - MOT20-05
target_min_gap: 1
target_max_gap: 1
split_seed: 42
seed: 42
grad_clip: 1.0
device: cuda
checkpoint_dir: checkpoints
log_dir: logs
feature_dir: datasets/mot20_gt_fastreid
sequences:
  - MOT20-01
  - MOT20-02
  - MOT20-03
  - MOT20-05
normalize_input: true
identity_loss_weight: 0.5
match_loss_weight: 0.2
