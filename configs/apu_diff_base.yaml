reid_dim: 2048
latent_dim: 2048
history_len: 5

predictor:
  num_diffusion_steps: 1
  time_dim: 64
  denoiser_hidden_dim: 1024

training:
  batch_size: 64
  stage1_epochs: 30
  lr_stage1: 0.0001
  weight_decay: 0.0001
  stage1_diff_weight: 0.2
  stage1_improve_weight: 2.0
  ema_alpha: 0.9

num_workers: 0
val_fraction: 0.1
split_mode: sequence
target_min_gap: 1
target_max_gap: 1
split_seed: 42
seed: 42
grad_clip: 1.0
device: cuda
checkpoint_dir: checkpoints
log_dir: logs
normalize_input: true
