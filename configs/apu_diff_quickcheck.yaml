reid_dim: 2048
latent_dim: 2048
history_len: 5

predictor:
  num_diffusion_steps: 1
  time_dim: 64
  denoiser_hidden_dim: 1024

training:
  batch_size: 64
  stage1_epochs: 2
  lr_stage1: 0.0001
  weight_decay: 0.0001
  stage1_diff_weight: 0.2
  stage1_improve_weight: 2.0
  ema_alpha: 0.9

num_workers: 0
val_fraction: 0.1
split_mode: sequence
val_sequences:
  - MOT17-04-FRCNN
  - MOT17-05-FRCNN
  - MOT17-09-FRCNN
target_min_gap: 1
target_max_gap: 10
split_seed: 42
seed: 42
grad_clip: 1.0
device: cuda
checkpoint_dir: checkpoints/quickcheck
log_dir: logs
feature_dir: datasets/mot17_gt_fastreid
sequences:
  - MOT17-02-FRCNN
  - MOT17-04-FRCNN
  - MOT17-05-FRCNN
  - MOT17-09-FRCNN
  - MOT17-10-FRCNN
  - MOT17-11-FRCNN
  - MOT17-13-FRCNN
normalize_input: true
